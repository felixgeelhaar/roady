# .goreleaser.yaml
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: roady
    main: ./cmd/roady/main.go
    binary: roady
    ldflags:
      - -s -w
      - -X github.com/felixgeelhaar/roady/internal/infrastructure/cli.Version={{.Version}}
      - -X github.com/felixgeelhaar/roady/internal/infrastructure/cli.Commit={{.Commit}}
      - -X github.com/felixgeelhaar/roady/internal/infrastructure/cli.Date={{.Date}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

  - id: roady-plugin-linear
    main: ./cmd/roady-plugin-linear/main.go
    binary: roady-plugin-linear
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: roady-plugin-jira
    main: ./cmd/roady-plugin-jira/main.go
    binary: roady-plugin-jira
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: roady-plugin-github
    main: ./cmd/roady-plugin-github/main.go
    binary: roady-plugin-github
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: roady-plugin-asana
    main: ./cmd/roady-plugin-asana/main.go
    binary: roady-plugin-asana
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: roady-plugin-notion
    main: ./cmd/roady-plugin-notion/main.go
    binary: roady-plugin-notion
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: roady-plugin-trello
    main: ./cmd/roady-plugin-trello/main.go
    binary: roady-plugin-trello
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

  - id: roady-plugin-mock
    main: ./cmd/roady-plugin-mock/main.go
    binary: roady-plugin-mock
    env: [CGO_ENABLED=0]
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]

archives:
  # Bundled distribution: one archive per platform containing the main
  # binary plus every plugin. Suits Homebrew + the typical "I want
  # everything" download.
  - id: bundle
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md*
      - ROADMAP.md*
      - docs/positioning.md*
      - docs/vs.md*
      - docs/advanced.md*

checksum:
  name_template: 'checksums.txt'

snapshot:
  name_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore\(\.roady\):'

brews:
  - name: roady
    repository:
      owner: felixgeelhaar
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://felixgeelhaar.github.io/roady/"
    description: "A planning-first system of record for software work."
    license: "MIT"
    install: |
      bin.install "roady"
      bin.install "roady-plugin-linear"
      bin.install "roady-plugin-jira"
      bin.install "roady-plugin-github"
      bin.install "roady-plugin-asana"
      bin.install "roady-plugin-notion"
      bin.install "roady-plugin-trello"
      bin.install "roady-plugin-mock"
    test: |
      system "#{bin}/roady --version"
