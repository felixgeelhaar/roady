name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.26'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1481404843c368bc19ca9406f87d6e0fc97bdcfd
        with:
          # `latest` so the linter binary stays compatible with whatever
          # Go version go.mod targets (a pinned older version was built
          # against an older Go and refused to run on go1.26 modules).
          version: latest
          # On main pushes (post-merge), require zero issues. On PRs,
          # only fail on issues newly introduced versus the merge base
          # so the gate doesn't drown new contributions in pre-existing
          # warnings.
          args: ${{ github.event_name == 'pull_request' && '--new-from-rev=origin/main' || '' }}

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

    - name: Set up Go
      uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
      with:
        go-version: '1.26'

    - name: Build
      run: |
        mkdir -p dist
        go build -v -o dist/roady ./cmd/roady
        go build -v -o dist/roady-plugin-mock ./cmd/roady-plugin-mock

    - name: Test
      run: go test -v -coverprofile=coverage.out ./...

    - name: Install coverctl
      run: go install github.com/felixgeelhaar/coverctl/cmd/coverctl@latest

    - name: Coverage policy gate
      # Domain thresholds live in .coverctl.yaml (cmd / application /
      # domain ≥ 80%, infrastructure ≥ 76%). Fails CI if any domain
      # regresses below the floor.
      run: coverctl check --from-profile -p coverage.out

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff
        with:
          go-version: '1.26'
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  release-smoke-test:
    # Pulls the just-published Linux/amd64 archive, extracts it, runs
    # `roady --version` and `roady demo` against it. Catches broken
    # release artifacts before users do.
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Wait for assets to settle
        run: sleep 30

      - name: Download release artifact
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          gh release download "$TAG" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern 'roady_Linux_x86_64.tar.gz' \
            --output roady-release.tar.gz

      - name: Extract + smoke test
        run: |
          set -euo pipefail
          mkdir -p smoke
          tar -xzf roady-release.tar.gz -C smoke
          ./smoke/roady --version
          # roady demo writes to ./roady-demo by default; isolate it.
          mkdir -p smoke-run && cd smoke-run
          ../smoke/roady demo
          test -f roady-demo/.roady/spec.yaml
          test -f roady-demo/.roady/plan.json
          ../smoke/roady -C roady-demo status
          echo "Smoke test passed."
